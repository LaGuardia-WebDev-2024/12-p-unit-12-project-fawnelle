<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
  
    <img src="https://media.tenor.com/XG72ImhI3-EAAAAi/mydollybelle-bunny.gif" width="70px"><h1>bunny quiz</h1>
   
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
       ୨ৎ what bunny breed is the smallest?
        <select id="movie-answer">
          <option value="movie1">netherland dwarf</option>
          <option value="movie2">english angora</option>
          <option value="movie3">holland lop</option>
          <option value="movie4">english lop</option>
        </select>
      </label>
      <button type="submit">check answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
         ୨ৎ which bunny breed is the largest?
        <select id="book-answer">
          <option value="book1">french lop</option>
          <option value="book2">giant chinchilla</option>
          <option value="book3">flemish giant</option>
          <option value="book4">british giant</option>
        </select>
      </label>
      <button type="submit">check answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("yes! they are considered the smallest domesticated breed, however the pygm rabbit is the smallest species! they both r very tiny and cute");
          $("#movie-text").image("https://media1.tenor.com/m/46gMJ-TjtDcAAAAC/rabbit-bunny.gif") ;
        } 
        else {
          $("#movie-text").text("nuhuh");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
